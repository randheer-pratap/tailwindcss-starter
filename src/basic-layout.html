<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Layout</title>
    <link href="./output.css" rel="stylesheet" />
  </head>
  <body class="min-h-screen flex flex-col text-black">
    <!-- NAVBAR Starts-->
    <nav class="bg-violet-500 p-4 shadow-lg">
      <div class="container mx-auto flex justify-between items-center">
        <div class="text-xl font-bold">My App</div>

        <!-- Desktop Menu -->
        <div class="hidden md:flex space-x-4">
          <a href="#" class="hover:text-blue-300">Home</a>
          <a href="#" class="hover:text-blue-300">About</a>
          <a href="#" class="hover:text-blue-300">Contact</a>
        </div>

        <!-- Mobile Hamburger -->
        <button id="menuBtn" class="md:hidden">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
        </button>
      </div>

      <!-- Mobile Menu -->
      <div id="mobileMenu" class="hidden flex-col mt-4 space-y-2 md:hidden">
        <a href="#" class="block">Home</a>
        <a href="#" class="block">About</a>
        <a href="#" class="block">Contact</a>
      </div>
    </nav>
    <!-- NAVBAR Ends -->
    <!-- MAIN LAYOUT Starts -->
    <div class="flex flex-1 flex-col md:flex-row">
      <!-- SIDEBAR -->
      <aside class="w-full md:w-64 bg-gray-500 p-4">Sidebar</aside>

      <!-- MAIN CONTENT -->
      <main class="flex-1 bg-gray-900 text-white p-6">
        <h1 class="text-3xl font-bold mb-4">Welcome to My App</h1>
        <p class="mb-4">This is a basic layout using Tailwind CSS.</p>
        <button class="px-4 py-2 bg-blue-500 rounded hover:bg-blue-600">
          Click Me
        </button>
      </main>

      <!-- ADS / RIGHT -->
      <aside class="w-full md:w-64 bg-gray-700 p-4 text-white">
        Ads / Extra
      </aside>
    </div>
    <!-- MAIN LAYOUT Ends -->
    <!-- FOOTER -->
    <footer class="bg-violet-500 text-white p-4 text-center">
      <p>&copy; 2026 My App</p>
    </footer>

    <!-- SCRIPT -->
    <script>
      const btn = document.getElementById("menuBtn");
      const menu = document.getElementById("mobileMenu");

      btn.addEventListener("click", () => {
        menu.classList.toggle("hidden");
      });
    </script>
  </body>
</html>
